<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PengWin Studios Math • Daily Discoveries</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<style>
:root{
    --bg:#0f172a;
    --bg2:#1e293b;
    --card:#1e293b;
    --accent:#f97316;
    --accent2:#fb923c;
    --text:#e2e8f0;
    --muted:#94a3b8;
    --border:#334155;
    --success:#22c55e;
    --danger:#ef4444;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{
    font-family:Inter,sans-serif;
    background:linear-gradient(135deg,var(--bg),var(--bg2));
    color:var(--text);
    min-height:100vh;
    line-height:1.6;
}
header{ text-align:center; padding:2.5rem 1rem; border-bottom:3px solid var(--accent); }
header h1{ font-size:2.8rem; }
.subtitle{ color:var(--muted); margin-top:.5rem; }

.container{ max-width:1100px; margin:auto; padding:2rem; }

.understanding-card{
    background:var(--card);
    border:2px solid var(--border);
    border-radius:16px;
    padding:1.5rem;
    margin-bottom:2rem;
}
.progress-bar{
    width:100%; height:28px; background:#111827; border-radius:999px; overflow:hidden;
}
.progress-fill{
    width:0%; height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:.4s;
}
.progress-text{ text-align:center; margin-top:.75rem; font-weight:700; }

.subject-grid, .levels-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:1.5rem;
}
.card{
    background:var(--card);
    border:2px solid var(--border);
    border-radius:16px;
    padding:2rem;
    cursor:pointer;
    transition:.3s;
    text-align:center;
}
.card:hover{
    transform:translateY(-8px);
    border-color:var(--accent);
}
.card h2{ margin:1rem 0 .5rem; }
.card p{ color:var(--muted); }

/* Lesson Modal */
.welcome-screen{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(15,23,42,.97);
    justify-content:center;
    align-items:center;
    padding:1rem;
    z-index:999;
    overflow-y:auto;
}
.welcome-content{
    width:100%;
    max-width:820px;
    background:var(--card);
    border-radius:18px;
    padding:2rem;
    max-height:92vh;
    overflow-y:auto;
}
.close-btn{
    position:absolute; top:20px; right:20px;
    background:transparent; color:var(--text);
    border:1px solid var(--border); padding:.75rem 1rem;
    border-radius:10px; cursor:pointer; font-size:1.4rem;
}
.lesson-section{ margin-bottom:2rem; }
.lesson-section h3{
    color:var(--accent);
    margin-bottom:1rem;
    border-bottom:2px solid var(--border);
    padding-bottom:0.5rem;
}
.equation{
    font-size:2.2rem;
    text-align:center;
    font-weight:800;
    color:var(--accent);
    background:#111827;
    padding:1.25rem;
    border-radius:12px;
    margin:1.5rem 0;
}
.example{
    background:#111827;
    padding:1.25rem;
    border-radius:12px;
    margin:1rem 0;
}
.curiosity{ border-left:4px solid var(--accent); padding-left:1rem; }
.tomorrow{ border-left:4px solid var(--success); padding-left:1rem; }

.input-group{
    display:flex; gap:1rem; margin:1rem 0;
}
input[type="text"]{
    flex:1; padding:1rem; background:#111827;
    border:2px solid var(--border); border-radius:12px;
    color:var(--text); font-size:1.1rem;
}
button{
    padding:1rem 1.5rem; border:none; border-radius:12px;
    background:var(--accent); color:white; font-weight:700;
    cursor:pointer; transition:.3s;
}
button:hover{ background:var(--accent2); }
.feedback{
    margin-top:1rem; padding:1rem; border-radius:12px; font-weight:600;
}
.success{ background:rgba(34,197,94,0.2); color:var(--success); }
.error{ background:rgba(239,68,68,0.2); color:var(--danger); }

.start-btn{
    margin-top:1.5rem; width:100%; padding:1.2rem; font-size:1.1rem;
}
footer{
    text-align:center; color:var(--muted); padding:2rem; font-size:0.9rem;
}
</style>
</head>
<body>
<header>
    <h1>PengWin Studios</h1>
    <p class="subtitle">One Discovery Per Day • Deep Understanding</p>
</header>
<div class="container">
    <div class="understanding-card">
        <h3>Deep Understanding Meter</h3>
        <div class="progress-bar">
            <div class="progress-fill" id="understandingFill"></div>
        </div>
        <div class="progress-text" id="understandingText">0% • Beginning Explorer</div>
        <p style="color:var(--muted);margin-top:1rem;">Progress earned only when you truly understand.</p>
    </div>

    <div id="subject-selection">
        <div class="header-section" style="text-align:center;margin-bottom:2rem;">
            <h2>Choose Your Subject for Today</h2>
            <p>One subject per day recommended</p>
        </div>
        <div class="subject-grid" id="subject-grid"></div>
    </div>

    <div id="lesson-list" style="display:none;">
        <div style="margin-bottom:1.5rem;">
            <button onclick="backToSubjects()" style="background:#334155;">← Back to Subjects</button>
        </div>
        <h2 id="current-subject-title" style="margin-bottom:1rem;color:var(--accent);"></h2>
        <div class="levels-grid" id="lesson-grid"></div>
    </div>
</div>

<!-- Lesson Modal -->
<div class="welcome-screen" id="welcome-screen">
    <button class="close-btn" onclick="closeLesson()">✕</button>
    <div class="welcome-content" id="lesson-content"></div>
</div>

<footer>PengWin Studios Math • One Concept a Day • Version 0.4</footer>

<script>
// Persistent data
let understanding = parseInt(localStorage.getItem('pengwinMathUnderstanding')) || 0;
let currentSubject = null;

const subjects = [
{
    id: "arithmetic",
    name: "Arithmetic",
    lessons: [
        {
            id:1, name:"Addition Mastery", equation:"7 + 5 = 12",
            intro:"Addition is the foundation...",
            fullExplanation:`<p><strong>Addition</strong> means combining quantities...</p><div class="example">7 apples + 5 apples = 12</div>`,
            why:"Used in shopping, scores, budgets...",
            curiosity:"Base-10 from our 10 fingers.",
            challengeQuestion:"23 + 48 = ?", challengeAnswer:"71",
            examples: ["15+27=42", "98+7=105"]
        },
        {
            id:2, name:"Subtraction", equation:"12 - 5 = 7",
            intro:"Subtraction is the inverse of addition.",
            fullExplanation:`<p>Think of it as removing or finding the difference.</p>`,
            why:"Calculating change, temperature drop, etc.",
            curiosity:"Negative numbers extend subtraction beyond zero.",
            challengeQuestion:"45 - 27 = ?", challengeAnswer:"18",
            examples: ["100-38=62", "56-19=37"]
        },
        {
            id:3, name:"Multiplication Basics", equation:"6 × 4 = 24",
            intro:"Multiplication is repeated addition.",
            fullExplanation:`<p>6 × 4 = 4 + 4 + 4 + 4 + 4 + 4</p>`,
            why:"Areas, scaling, rates.",
            curiosity:"× symbol introduced in 1618.",
            challengeQuestion:"8 × 7 = ?", challengeAnswer:"56",
            examples: ["5×9=45", "12×6=72"]
        }
    ]
},
{
    id: "prealgebra",
    name: "Pre-Algebra",
    lessons: [ /* 3 lessons */ {
        id:1, name:"Order of Operations", equation:"3 × (4 + 2) = 18",
        intro:"PEMDAS / BODMAS rules.",
        fullExplanation:`<p>Parentheses first, then multiply...</p>`,
        why:"Prevents calculation errors.",
        curiosity:"The reason parentheses exist.",
        challengeQuestion:"5 × (2 + 7) = ?", challengeAnswer:"45",
        examples: ["10 - 2 × 3 = 4"]
    },
    { id:2, name:"Exponents", equation:"2³ = 8", intro:"Repeated multiplication.", /* ... */ challengeQuestion:"3⁴ = ?", challengeAnswer:"81" },
    { id:3, name:"Negative Numbers", equation:"-5 + 8 = 3", intro:"Numbers below zero.", /* ... */ challengeQuestion:"-12 + 7 = ?", challengeAnswer:"-5" }]
},
{
    id: "algebra",
    name: "Algebra I",
    lessons: [ /* 3 lessons with similar structure */ {
        id:1, name:"Solving Simple Equations", equation:"x + 5 = 12",
        intro:"Working with unknowns.", fullExplanation:`<p>Balance method...</p>`,
        why:"Everyday problem solving.", curiosity:"Why 'x' is used.",
        challengeQuestion:"x + 9 = 21", challengeAnswer:"12", examples:[]
    },
    { id:2, name:"Distributive Property", equation:"3(x + 4) = 3x + 12", /* ... */ challengeQuestion:"2(5 + y) = ?", challengeAnswer:"10 + 2y" },
    { id:3, name:"Inequalities", equation:"x > 7", /* ... */ challengeQuestion:"Solve x - 3 < 10", challengeAnswer:"x < 13" }]
},
{
    id: "geometry",
    name: "Geometry",
    lessons: [ /* 3 lessons */ {
        id:1, name:"Area of Circles", equation:"A = πr²", /* ... */ challengeQuestion:"r=7, π≈3.14 → Area?", challengeAnswer:"153.86"
    },
    { id:2, name:"Pythagorean Theorem", equation:"a² + b² = c²", /* ... */ },
    { id:3, name:"Angles & Triangles", equation:"Sum = 180°", /* ... */ }]
},
{
    id: "calculus",
    name: "Calculus Intro",
    lessons: [ /* 3 lessons */ {
        id:1, name:"Derivatives Basics", equation:"d/dx(x²)=2x", /* ... */ challengeQuestion:"Derivative of position?", challengeAnswer:"Velocity"
    },
    { id:2, name:"Limits", equation:"lim x→2 (x²-4)/(x-2)", /* ... */ },
    { id:3, name:"Instantaneous Rate", /* ... */ }]
}
];

// Fill missing lessons with proper content (shortened for brevity)
subjects.forEach(s => {
    while(s.lessons.length < 3) {
        s.lessons.push({
            id: s.lessons.length+1,
            name: `Lesson ${s.lessons.length+1}`,
            equation: "2 + 2 = 4",
            intro: "Deep dive into the topic.",
            fullExplanation: `<p>More explanation here...</p>`,
            why: "Real world applications.",
            curiosity: "Fun fact.",
            challengeQuestion: "What is 15 + 27?",
            challengeAnswer: "42",
            examples: ["Example 1", "Example 2"]
        });
    }
});

function getRank(){
    if(understanding >= 90) return "Master Thinker";
    if(understanding >= 75) return "Advanced Explorer";
    if(understanding >= 50) return "Skilled Learner";
    if(understanding >= 25) return "Growing Mind";
    return "Beginning Explorer";
}

function updateUnderstanding(){
    const percent = Math.min(understanding, 100);
    document.getElementById("understandingFill").style.width = percent + "%";
    document.getElementById("understandingText").textContent = percent + "% • " + getRank();
    localStorage.setItem('pengwinMathUnderstanding', understanding);
}

function showSubjectSelection(){
    document.getElementById("subject-selection").style.display = "block";
    document.getElementById("lesson-list").style.display = "none";
    
    const grid = document.getElementById("subject-grid");
    grid.innerHTML = "";
    subjects.forEach(subject => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<h2>${subject.name}</h2><p>3 Lessons</p>`;
        card.onclick = () => showSubjectLessons(subject);
        grid.appendChild(card);
    });
}

function showSubjectLessons(subject){
    currentSubject = subject;
    document.getElementById("subject-selection").style.display = "none";
    document.getElementById("lesson-list").style.display = "block";
    document.getElementById("current-subject-title").textContent = `${subject.name} — Choose a Lesson`;
    
    const grid = document.getElementById("lesson-grid");
    grid.innerHTML = "";
    subject.lessons.forEach(lesson => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <div style="font-size:2.5rem;font-weight:800;color:var(--accent);">${lesson.id}</div>
            <h2>${lesson.name}</h2>
        `;
        card.onclick = () => showLesson(lesson);
        grid.appendChild(card);
    });
}

function backToSubjects(){
    currentSubject = null;
    showSubjectSelection();
}

// Rest of lesson functions (same as before with +5 points)
function createLessonHTML(lesson){
    return `
        <h1 style="color:var(--accent);margin-bottom:0.5rem;">${lesson.name}</h1>
        <p style="color:var(--muted);">${currentSubject.name} • Lesson ${lesson.id}</p>
        
        <div class="lesson-section"><h3>Core Concept</h3><p>${lesson.intro}</p></div>
        <div class="lesson-section"><h3>Key Equation</h3><div class="equation">\\(${lesson.equation}\\)</div></div>
        <div class="lesson-section"><h3>Deep Explanation</h3>${lesson.fullExplanation}</div>
        <div class="lesson-section"><h3>Why It Matters</h3><p>${lesson.why}</p></div>
        <div class="lesson-section curiosity"><h3>Curiosity Card</h3><p>${lesson.curiosity}</p></div>
        <div class="lesson-section"><h3>Practice Examples</h3>${lesson.examples.map(e=>`<div class="example">${e}</div>`).join('')}</div>
        
        <div class="lesson-section practice">
            <h3>Mini Challenge</h3>
            <p><strong>${lesson.challengeQuestion}</strong></p>
            <div class="input-group">
                <input type="text" id="challenge-input" placeholder="Your answer...">
                <button onclick="submitChallenge(${lesson.id})">Check Answer</button>
            </div>
            <div id="challenge-feedback"></div>
        </div>

        <button class="start-btn" onclick="completeDiscovery(${lesson.id})" id="complete-btn" disabled>
            Complete Lesson (+5 Understanding)
        </button>
    `;
}

function showLesson(lesson){
    document.getElementById("lesson-content").innerHTML = createLessonHTML(lesson);
    document.getElementById("welcome-screen").style.display = "flex";
    
    setTimeout(() => {
        if (window.MathJax) { MathJax.typesetClear(); MathJax.typeset(); }
    }, 150);
}

function submitChallenge(lessonId){
    const lesson = currentSubject.lessons.find(l => l.id === lessonId);
    const input = document.getElementById("challenge-input").value.trim();
    const feedbackEl = document.getElementById("challenge-feedback");
    
    if(!input){
        feedbackEl.innerHTML = "Please enter an answer."; feedbackEl.className = "feedback error";
        return;
    }
    
    const correct = checkAnswer(input, lesson.challengeAnswer, feedbackEl);
    if(correct){
        document.getElementById("complete-btn").disabled = false;
    }
}

function checkAnswer(user, correct, el){
    if(Math.abs(parseFloat(user) - parseFloat(correct)) < 0.1){
        el.innerHTML = `✅ Correct! You can now complete the lesson.`; el.className = "feedback success";
        return true;
    } else {
        el.innerHTML = `❌ The correct answer is <strong>${correct}</strong>`; el.className = "feedback error";
        return false;
    }
}

function completeDiscovery(){
    understanding += 5;
    if(understanding > 100) understanding = 100;
    updateUnderstanding();
    alert("Great work! +5 Understanding added.");
    closeLesson();
}

function closeLesson(){
    document.getElementById("welcome-screen").style.display = "none";
}

// Init
window.onload = () => {
    updateUnderstanding();
    showSubjectSelection();
};
</script>
</body>
</html>
