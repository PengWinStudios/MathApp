<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PengWin Studios Math • Daily Discoveries</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<style>
:root{
    --bg:#0f172a;
    --bg2:#1e293b;
    --card:#1e293b;
    --accent:#f97316;
    --accent2:#fb923c;
    --text:#e2e8f0;
    --muted:#94a3b8;
    --border:#334155;
    --success:#22c55e;
    --danger:#ef4444;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{
    font-family:Inter,sans-serif;
    background:linear-gradient(135deg,var(--bg),var(--bg2));
    color:var(--text);
    min-height:100vh;
    line-height:1.6;
}
header{ 
    text-align:center; 
    padding:2rem 1rem; 
    border-bottom:3px solid var(--accent); 
    position:relative; 
}
header h1{ font-size:clamp(1.8rem, 5vw, 2.6rem); }
.subtitle{ color:var(--muted); margin-top:.5rem; font-size:0.95rem; }

.streak{
    position:absolute; top:15px; right:15px;
    background:var(--card); padding:6px 14px; border-radius:999px;
    border:2px solid var(--accent); font-weight:700; font-size:0.9rem;
}

.container{ max-width:1100px; margin:auto; padding:1rem; }

.understanding-card{
    background:var(--card);
    border:2px solid var(--border);
    border-radius:16px;
    padding:1.25rem;
    margin-bottom:2rem;
}
.progress-bar{ width:100%; height:26px; background:#111827; border-radius:999px; overflow:hidden; }
.progress-fill{ width:0%; height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:.4s; }
.progress-text{ text-align:center; margin-top:.75rem; font-weight:700; font-size:0.95rem; }

.subject-grid, .levels-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
    gap:1.25rem;
}
.card{
    background:var(--card);
    border:2px solid var(--border);
    border-radius:16px;
    padding:1.75rem 1.25rem;
    cursor:pointer;
    transition:.3s;
    text-align:center;
}
.card:hover{ transform:translateY(-6px); border-color:var(--accent); }

.welcome-screen{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(15,23,42,.98);
    justify-content:center;
    align-items:center;
    padding:0.75rem;
    z-index:999;
    overflow-y:auto;
}
.welcome-content{
    width:100%;
    max-width:820px;
    background:var(--card);
    border-radius:18px;
    padding:1.5rem;
    max-height:94vh;
    overflow-y:auto;
}
.close-btn{
    position:absolute; top:15px; right:15px;
    background:transparent; color:var(--text);
    border:1px solid var(--border); padding:0.6rem 0.9rem;
    border-radius:10px; cursor:pointer; font-size:1.5rem;
}

.lesson-section{ margin-bottom:1.75rem; }
.lesson-section h3{
    color:var(--accent);
    margin-bottom:0.75rem;
    border-bottom:2px solid var(--border);
    padding-bottom:0.4rem;
    font-size:1.15rem;
}
.equation{
    font-size:clamp(1.6rem, 4.5vw, 2rem);
    text-align:center;
    font-weight:800;
    color:var(--accent);
    background:#111827;
    padding:1rem;
    border-radius:12px;
    margin:1.25rem 0;
}
.example{
    background:#111827;
    padding:1rem;
    border-radius:12px;
    margin:0.75rem 0;
    font-size:0.95rem;
}

.input-group{
    display:flex; flex-direction:column; gap:0.75rem; margin:1rem 0;
}
@media (min-width: 640px) {
    .input-group{ flex-direction:row; }
}
input[type="text"]{
    flex:1; padding:1rem; background:#111827;
    border:2px solid var(--border); border-radius:12px;
    color:var(--text); font-size:1.05rem;
}
button{
    padding:1rem 1.5rem; border:none; border-radius:12px;
    background:var(--accent); color:white; font-weight:700;
    cursor:pointer; transition:.3s;
}
button:hover{ background:var(--accent2); }

.feedback{
    margin-top:1rem; padding:1rem; border-radius:12px; font-weight:600;
}
.success{ background:rgba(34,197,94,0.2); color:var(--success); }
.error{ background:rgba(239,68,68,0.2); color:var(--danger); }

.start-btn, .next-btn{
    margin-top:1.25rem; width:100%; padding:1.1rem; font-size:1.05rem;
}
.next-btn{ background:var(--success); }

footer{
    text-align:center; color:var(--muted); padding:1.5rem; font-size:0.85rem;
}
</style>
</head>
<body>
<header>
    <h1>PengWin Studios</h1>
    <p class="subtitle">One Discovery Per Day • Deep Understanding</p>
    <div class="streak" id="streak-counter">🔥 0 Day Streak</div>
</header>
<div class="container">
    <div class="understanding-card">
        <h3>Deep Understanding Meter</h3>
        <div class="progress-bar">
            <div class="progress-fill" id="understandingFill"></div>
        </div>
        <div class="progress-text" id="understandingText">0% • Beginning Explorer</div>
        <p style="color:var(--muted);margin-top:1rem;">Progress only when you truly understand.</p>
    </div>

    <div id="subject-selection">
        <div style="text-align:center;margin-bottom:2rem;">
            <h2>Choose Your Subject for Today</h2>
            <p>One subject per day recommended</p>
        </div>
        <div class="subject-grid" id="subject-grid"></div>
    </div>

    <div id="lesson-list" style="display:none;">
        <div style="margin-bottom:1.5rem;">
            <button onclick="backToSubjects()" style="background:#334155;padding:0.8rem 1.2rem;">← Back to Subjects</button>
        </div>
        <h2 id="current-subject-title" style="margin-bottom:1rem;color:var(--accent);"></h2>
        <div class="levels-grid" id="lesson-grid"></div>
    </div>
</div>

<div class="welcome-screen" id="welcome-screen">
    <button class="close-btn" onclick="closeLesson()">✕</button>
    <div class="welcome-content" id="lesson-content"></div>
</div>

<footer>PengWin Studios Math • One Concept a Day • Version 0.6.1</footer>

</body>
</html>
